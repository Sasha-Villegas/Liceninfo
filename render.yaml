# ============================================
# render.yaml - Deploy en Render.com
# ============================================
# Este archivo configura el deploy automático
# del backend FastAPI que también sirve el frontend.

services:
  - type: web
    name: liceninfo
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false  # Lo configurás manualmente en Render
      - key: SMTP_PASS
        sync: false  # Lo configurás manualmente en Render
      - key: GEMINI_API_KEY
        sync: false  # Lo configurás manualmente en Render
    plan: free
    healthCheckPath: /api/health
