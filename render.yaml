# ============================================
# render.yaml - Deploy en Render.com
# ============================================

services:
  - type: web
    name: liceninfo
    runtime: python
    # Sin rootDir para que tanto frontend/ como backend/ estén disponibles
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    plan: free
    healthCheckPath: /api/health
